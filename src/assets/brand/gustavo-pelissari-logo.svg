    <text x="0" y="82" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500" letter-spacing="9.2" opacity="0.86">OENNING</text>
    <path d="M0 102H168" stroke="#d4af37" stroke-opacity="0.3" stroke-width="2"/>
    <path d="M184 102H260" stroke="#d4af37" stroke-opacity="0.14" stroke-width="2"/>
    <rect x="168" y="98" width="8" height="8" fill="#d4af37"/>
