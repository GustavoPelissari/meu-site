<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 180" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Logotipo Gustavo Pelissari Oenning</title>
  <desc id="logoDesc">Logotipo futurista e técnico com monograma GP angular em dourado e wordmark premium.</desc>
  <defs>
    <linearGradient id="gpGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7e59d"/>
      <stop offset="42%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8f6a16"/>
    </linearGradient>
    <linearGradient id="gpGoldSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7e59d" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8f6a16" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="gpGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

