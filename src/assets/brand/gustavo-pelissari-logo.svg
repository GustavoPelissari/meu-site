<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 170" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Logotipo Gustavo Pelissari Oenning</title>
  <desc id="logoDesc">Marca premium forte e marcante com escudo geométrico GP dourado e wordmark técnico.</desc>
  <defs>
    <linearGradient id="gpGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4e08c"/>
      <stop offset="42%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8e6a17"/>
    </linearGradient>
    <linearGradient id="gpGoldEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f4e08c" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#8e6a17" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="gpGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(10 10)" fill="none" stroke-linecap="square" stroke-linejoin="miter" filter="url(#gpGlow)">
    <path
      d="M72 10H112L144 42V104L112 136H50L18 104V42L50 10H72"
      stroke="url(#gpGold)"
      stroke-width="10"
    />
    <path
      d="M58 24H108L130 46V100L108 122H56L34 100V46L56 24"
      stroke="url(#gpGoldEdge)"
      stroke-width="2"
      opacity="0.48"
    />
    <path
      d="M106 34H68L48 54V92L68 112H106V88H80V72H112"
      stroke="url(#gpGold)"
      stroke-width="12"
    />
    <path
      d="M80 34V114"
      stroke="url(#gpGold)"
      stroke-width="12"
    />
    <path
      d="M80 34H110L124 48V60L110 74H80"
      stroke="url(#gpGold)"
      stroke-width="12"
    />
    <path
      d="M44 40H118"
      stroke="url(#gpGoldEdge)"
      stroke-width="3"
      opacity="0.75"
    />
    <rect x="136" y="66" width="8" height="8" fill="#d4af37" stroke="none"/>
  </g>

  <g transform="translate(176 30)">
    <path d="M0 14V108" stroke="#d4af37" stroke-opacity="0.36" stroke-width="2"/>
    <rect x="-4" y="58" width="8" height="8" fill="#d4af37"/>
