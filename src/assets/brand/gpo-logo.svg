<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 190" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Logotipo Gustavo Pelissari Oenning</title>
  <desc id="logoDesc">Escudo hexagonal geométrico com monograma GPO em amarelo ouro e wordmark técnico em branco.</desc>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff08a"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#d6aa00"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="820" height="190" rx="28" fill="#050505"/>

  <g transform="translate(28 27)">
    <rect x="0" y="0" width="136" height="136" rx="26" fill="#050505" stroke="rgba(255,255,255,0.08)"/>

    <g transform="translate(15 14)" fill="none" stroke="url(#gold)" stroke-width="7.5" stroke-linecap="square" stroke-linejoin="miter" filter="url(#glow)">
      <path d="M53 8H81L102 28V80L81 104H27L6 80V28L27 8H53" opacity="0.95"/>
      <path d="M76 28H49L34 43V66L49 81H67L78 70" />
      <path d="M60 55H79" />
      <path d="M52 28V96" />
      <path d="M52 28H77L87 38V50L77 60H52" />
      <path d="M28 79H76L88 91V96H28L16 84V28" opacity="0.92"/>
    </g>
  </g>

  <g transform="translate(205 53)" fill="#FFFFFF">
    <text x="0" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="35" font-weight="800" letter-spacing="2.2">GUSTAVO PELISSARI</text>
    <text x="0" y="82" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" letter-spacing="8.5" opacity="0.95">OENNING</text>
  </g>
</svg>
