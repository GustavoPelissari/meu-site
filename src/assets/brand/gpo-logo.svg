<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Logotipo Gustavo Pelissari Oenning</title>
  <desc id="logoDesc">Monograma geométrico GPO em ouro mate escovado com wordmark em duas linhas.</desc>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d5b06a"/>
      <stop offset="45%" stop-color="#c5a059"/>
      <stop offset="100%" stop-color="#a8833c"/>
    </linearGradient>
    <linearGradient id="goldSheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b28c49" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f0d08f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b28c49" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="760" height="180" rx="28" fill="#050505"/>

  <g transform="translate(26 26)">
    <rect x="0" y="0" width="128" height="128" rx="28" fill="#080808" stroke="rgba(224,224,224,0.08)"/>

    <g transform="translate(14 14)" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter" filter="url(#softGlow)">
      <path d="M86 28H68C48 28 34 42 34 62C34 82 48 96 68 96C83 96 95 89 102 77" />
      <path d="M68 62H94" />
      <path d="M68 28V96" />
      <path d="M68 28H92C101 28 108 35 108 44C108 53 101 60 92 60H68" />
      <path d="M68 18C44 18 24 38 24 62C24 86 44 106 68 106C92 106 112 86 112 62C112 38 92 18 68 18Z" />
    </g>

    <path d="M38 46H98" stroke="url(#goldSheen)" stroke-width="3" opacity="0.55"/>
    <path d="M32 92H104" stroke="url(#goldSheen)" stroke-width="2" opacity="0.22"/>
  </g>

  <g transform="translate(186 46)" fill="#E0E0E0">
    <text x="0" y="36" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="2">GUSTAVO PELISSARI</text>
    <text x="0" y="86" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="29" font-weight="500" letter-spacing="9" opacity="0.84">OENNING</text>
  </g>
</svg>
